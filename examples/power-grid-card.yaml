type: vertical-stack
cards:
  - type: custom:mushroom-template-card
    primary: Power Grid
    secondary: Ternopil schedule and live power probe
    icon: mdi:transmission-tower
    icon_color: cyan
    fill_container: true
    tap_action:
      action: none
    hold_action:
      action: none
    card_mod:
      style: |
        ha-card {
          background:
            radial-gradient(circle at top left, rgba(69, 160, 255, 0.20), transparent 48%),
            linear-gradient(180deg, rgba(30, 37, 47, 0.98), rgba(20, 24, 31, 0.98));
          border: 1px solid rgba(110, 176, 255, 0.22);
          border-radius: 28px;
          box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
        }

  - type: custom:mushroom-template-card
    primary: >
      {% set ping_entity = 'binary_sensor.ternopil_grid_power_ping'
        if states('binary_sensor.ternopil_grid_power_ping') not in ['unknown', 'unavailable']
        else 'binary_sensor.power_ping' %}
      {% set p = states(ping_entity) %}
      {{ 'Grid is Down' if p == 'off' else 'Grid is Online' if p == 'on' else 'Grid state unknown' }}
    secondary: >
      {% set ping_entity = 'binary_sensor.ternopil_grid_power_ping'
        if states('binary_sensor.ternopil_grid_power_ping') not in ['unknown', 'unavailable']
        else 'binary_sensor.power_ping' %}
      {% set planned_entity = 'binary_sensor.ternopil_grid_planned_outage'
        if states('binary_sensor.ternopil_grid_planned_outage') not in ['unknown', 'unavailable']
        else 'binary_sensor.planned_outage' %}
      {% set p = states(ping_entity) %}
      {% set pl = states(planned_entity) %}
      {% if p == 'off' and pl == 'off' %}
        Unplanned outage (ping OFF, schedule not outage)
      {% elif p == 'on' and pl == 'on' %}
        Power is present during a planned outage window
      {% elif p == 'off' and pl == 'on' %}
        Planned outage active
      {% else %}
        Power is flowing normally
      {% endif %}
    icon: >
      {% set ping_entity = 'binary_sensor.ternopil_grid_power_ping'
        if states('binary_sensor.ternopil_grid_power_ping') not in ['unknown', 'unavailable']
        else 'binary_sensor.power_ping' %}
      {% set p = states(ping_entity) %}
      {{ 'mdi:transmission-tower-off' if p == 'off' else 'mdi:transmission-tower' }}
    icon_color: >
      {% set ping_entity = 'binary_sensor.ternopil_grid_power_ping'
        if states('binary_sensor.ternopil_grid_power_ping') not in ['unknown', 'unavailable']
        else 'binary_sensor.power_ping' %}
      {% set planned_entity = 'binary_sensor.ternopil_grid_planned_outage'
        if states('binary_sensor.ternopil_grid_planned_outage') not in ['unknown', 'unavailable']
        else 'binary_sensor.planned_outage' %}
      {% set p = states(ping_entity) %}
      {% set pl = states(planned_entity) %}
      {{ 'red' if p == 'off' else 'amber' if pl == 'on' else 'green' }}
    multiline_secondary: true
    fill_container: true
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          border: 1px solid rgba(132, 201, 255, 0.14);
          border-radius: 28px;
          box-shadow: 0 14px 32px rgba(0, 0, 0, 0.18);
        }

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-select-card
        entity: select.ternopil_grid_street
        name: Street
        icon: mdi:alpha-a-circle
        secondary_info: state
        fill_container: true
        card_mod:
          style: |
            ha-card {
              border: 1px solid rgba(132, 201, 255, 0.14);
              border-radius: 26px;
              box-shadow: 0 12px 28px rgba(0, 0, 0, 0.16);
            }
      - type: custom:mushroom-template-card
        primary: >
          {% set group = states('select.ternopil_grid_outage_group') %}
          Group {{ group if group not in ['unknown', 'unavailable', ''] else '—' }}
        secondary: >
          {% set ping_entity = 'binary_sensor.ternopil_grid_power_ping'
            if states('binary_sensor.ternopil_grid_power_ping') not in ['unknown', 'unavailable', '']
            else 'binary_sensor.power_ping' %}
          {% set probe = state_attr(ping_entity, 'target_display') %}
          {% set updated = state_attr(ping_entity, 'source_updated_at') %}
          Live probe: {{ probe if probe not in [none, '', 'unknown', 'unavailable'] else 'Manual target' }}
          {% if updated %}
          {{ '\n' }}
          Updated {{ as_local(as_datetime(updated)).strftime('%H:%M:%S') }}
          {% endif %}
        icon: mdi:home-group
        icon_color: blue
        multiline_secondary: true
        fill_container: true
        card_mod:
          style: |
            ha-card {
              border: 1px solid rgba(132, 201, 255, 0.14);
              border-radius: 26px;
              box-shadow: 0 12px 28px rgba(0, 0, 0, 0.16);
            }

  - type: custom:mushroom-template-card
    primary: >
      {% set schedule_entity = 'sensor.ternopil_grid_schedule_rolling_24h'
        if state_attr('sensor.ternopil_grid_schedule_rolling_24h', 'chart_svg')
        else 'sensor.schedule_rolling_24h' %}
      {% set next_change = state_attr(schedule_entity, 'next_change_iso') %}
      Next scheduled change:
      {{ as_local(as_datetime(next_change)).strftime('%d.%m %H:%M') if next_change not in [none, '', 'unknown', 'unavailable', 'none'] else '—' }}
    secondary: >
      {% set schedule_entity = 'sensor.ternopil_grid_schedule_rolling_24h'
        if state_attr('sensor.ternopil_grid_schedule_rolling_24h', 'chart_svg')
        else 'sensor.schedule_rolling_24h' %}
      {% set updated = state_attr(schedule_entity, 'source_updated_at') %}
      {% set cd = state_attr(schedule_entity, 'countdown') | int(0) %}
      {% set off_today = state_attr(schedule_entity, 'off_today') | int(0) %}
      {% set off_tomorrow = state_attr(schedule_entity, 'off_tomorrow') | int(0) %}
      {% set off_next = state_attr(schedule_entity, 'off_next_24h') | int(0) %}
      {% set hours = cd // 3600 %}
      {% set minutes = (cd % 3600) // 60 %}
      In {{ '%dh %02dm' | format(hours, minutes) if cd > 0 else '—' }}
      {% if updated %}
      • Updated {{ as_local(as_datetime(updated)).strftime('%H:%M:%S') }}
      {% endif %}
      {{ '\n' }}
      OFF: next 24h {{ '%dh %02dm' | format(off_next // 60, off_next % 60) if off_next > 0 else '0h 00m' }}
      • today {{ '%dh %02dm' | format(off_today // 60, off_today % 60) if off_today > 0 else '0h 00m' }}
      • tomorrow {{ '%dh %02dm' | format(off_tomorrow // 60, off_tomorrow % 60) if off_tomorrow > 0 else '0h 00m' }}
    icon: mdi:calendar-clock
    icon_color: amber
    multiline_secondary: true
    fill_container: true
    card_mod:
      style: |
        ha-card {
          border: 1px solid rgba(255, 196, 69, 0.18);
          border-radius: 28px;
          box-shadow: 0 14px 32px rgba(0, 0, 0, 0.18);
        }

  - type: markdown
    content: >-
      {% set schedule_entity = 'sensor.ternopil_grid_schedule_rolling_24h'
        if state_attr('sensor.ternopil_grid_schedule_rolling_24h', 'chart_svg')
        else 'sensor.schedule_rolling_24h' %}
      {% set chart_svg = state_attr(schedule_entity, 'chart_svg') %}
      {% if chart_svg %}
      <img src="data:image/svg+xml;utf8,{{
      chart_svg | urlencode }}"
      style="width: 100%; display: block;" />
      {% else %}
      Chart is unavailable until the Ternopil Grid sensor updates.
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background:
            radial-gradient(circle at top right, rgba(126, 160, 255, 0.10), transparent 38%),
            linear-gradient(180deg, rgba(38, 39, 48, 0.98), rgba(27, 29, 37, 0.98));
          border: 1px solid rgba(132, 201, 255, 0.12);
          border-radius: 30px;
          box-shadow: 0 18px 38px rgba(0, 0, 0, 0.22);
          padding: 14px 16px 10px !important;
          margin-top: 8px;
        }
